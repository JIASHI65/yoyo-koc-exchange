<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug</title></head><body>
<h2>Supabase 连接诊断</h2>
<div id="results"></div>
<script>
const URL = 'https://rryzofimrehmkijkckrm.supabase.co';
const KEY = 'sb_publishable_oyewqnQ8AnitAOD94Qg0nA_v6Zqkr7r';
const headers = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY };

async function test(name, url) {
  try {
    const r = await fetch(url, { headers });
    const d = await r.json();
    const ok = Array.isArray(d) && d.length > 0;
    return name + ': ' + (ok ? '✅ ' + d.length + ' rows' : '❌ ' + JSON.stringify(d).substring(0, 100));
  } catch(e) { return name + ': ❌ ' + e.message; }
}

(async () => {
  const r = document.getElementById('results');
  r.innerHTML += (await test('kocs', URL+'/rest/v1/kocs?limit=2&select=uid')) + '<br>';
  r.innerHTML += (await test('submissions', URL+'/rest/v1/submissions?limit=2&select=id')) + '<br>';
  r.innerHTML += (await test('redemption_orders', URL+'/rest/v1/redemption_orders?limit=2&select=id')) + '<br>';
  r.innerHTML += (await test('campaign_config', URL+'/rest/v1/campaign_config?select=*')) + '<br>';
  r.innerHTML += (await test('point_logs', URL+'/rest/v1/point_logs?limit=2&select=id')) + '<br>';
  r.innerHTML += '<br><b>如果上面全绿✅，API 就正常。白屏问题在 JS 逻辑。</b>';
})();
</script></body></html>
