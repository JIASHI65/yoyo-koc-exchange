<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoyo Creative Studio — Bilingual KOC FAQ</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#FFF3F6;--card:#FFFBF7;--ink:#43263E;--ink-soft:#7A5C74;--rose:#F2618C;--lav:#8E6FD8;--mint:#39B79B;--gold:#F0A93B;--line:#F3D9E2;--radius:20px;--disp:'Baloo 2','Noto Sans SC',sans-serif;--body:'Noto Sans SC',sans-serif;--mono:'Space Mono',monospace;--en-body:'Inter','Segoe UI',system-ui,sans-serif}
[lang="en"]{--body:var(--en-body);--disp:'Baloo 2','Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.75;background-image:radial-gradient(circle at 15% 20%,rgba(142,111,216,.06)0,transparent 40%),radial-gradient(circle at 85% 70%,rgba(242,97,140,.07)0,transparent 45%)}
.header{position:sticky;top:0;z-index:50;background:rgba(255,243,246,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 20px;text-align:center}
.header h1{font-family:var(--disp);font-weight:800;font-size:16px;color:var(--ink)}
.header h1 b{color:var(--rose)}
.header .sub{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:3px;letter-spacing:.08em}
.header-row{display:flex;align-items:center;justify-content:center;gap:14px}
.lang-toggle{font-family:var(--mono);font-size:15px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;-webkit-user-select:none;user-select:none;background:var(--card);border:2px solid var(--line);border-radius:99px;padding:6px 16px}
.lang-toggle .opt{color:var(--ink-soft);text-decoration:none;transition:color .2s;background:none;border:none;cursor:pointer;font-family:inherit;font-size:15px;padding:3px 10px;border-radius:99px}
.lang-toggle .opt.active{color:var(--rose);font-weight:700;pointer-events:none}
.lang-toggle .opt:not(.active):hover{color:var(--ink)}
.lang-toggle .sep{color:var(--line);font-size:15px}
.container{max-width:800px;margin:0 auto;padding:22px;position:relative;z-index:1}
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{width:100%;padding:10px 36px;background:var(--card);border:2px solid var(--ink);border-radius:99px;font-family:var(--body);font-size:13px;outline:none;transition:all .2s;color:var(--ink)}
.search-wrap input:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(242,97,140,.15)}
.search-wrap .icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;justify-content:center}
.suggestions .chip{padding:4px 12px;background:var(--card);border:2px solid var(--line);border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--ink-soft);font-family:var(--body)}
.suggestions .chip:hover{border-color:var(--rose);color:var(--rose);background:#FFF3F6}
.category{margin-bottom:22px}
.category-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:6px 0}
.category-header .icon{font-size:22px;width:32px;text-align:center}
.category-header h2{font-family:var(--disp);font-size:20px;font-weight:700;color:var(--ink)}
.category-header .count{font-family:var(--mono);font-size:11px;color:var(--ink-soft);background:var(--line);padding:2px 8px;border-radius:99px;margin-left:auto}
.item{border:2px solid var(--line);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:var(--card);transition:all .2s}
.item.hidden{display:none}
.item-header{display:flex;align-items:flex-start;gap:8px;padding:12px 14px;cursor:pointer;transition:background .2s;-webkit-user-select:none;user-select:none}
.item-header:hover{background:rgba(242,97,140,.04)}
.item-header .q-num{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--rose);line-height:1.2;min-width:30px}
.item-header .q-text{flex:1;font-weight:600;font-size:14px;color:var(--ink);padding-top:4px}
.item-header .q-text .highlight{background:#FFE066;border-radius:4px;padding:1px 3px}
.item-header .rarity-tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:99px;background:var(--line);color:var(--ink-soft);margin-top:5px;white-space:nowrap;letter-spacing:.05em}
.item-header .rarity-tag.ssr{background:linear-gradient(135deg,#F0A93B,#F2618C);color:#fff}
.item-body{padding:0 14px 14px;border-top:1px solid var(--line);display:none}
.item-body.open{display:block}
.item-body p{margin-bottom:6px;font-size:13px;white-space:pre-wrap}
.item-body ul{padding-left:18px;margin-bottom:6px;font-size:13px}
.item-body li{margin-bottom:3px}
.item-body strong{color:var(--rose)}
.item-body code{background:var(--line);font-family:var(--mono);font-size:12px;padding:1px 5px;border-radius:6px}
.item-body table{width:100%;border-collapse:collapse;margin:6px 0;font-size:13px}
.item-body th,.item-body td{border:1px solid var(--line);padding:6px 10px;text-align:left}
.item-body th{background:#FFF3F6;font-weight:600}
.item-body .copy-btn{float:right;background:none;border:0;border-radius:99px;padding:2px 10px;font-size:10px;color:var(--ink-soft);cursor:pointer;font-family:var(--mono);transition:all .2s;margin-bottom:4px}
.item-body .copy-btn:hover{background:var(--rose);color:#fff}
.footer{text-align:center;padding:30px 20px 50px;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.footer a{color:var(--rose);text-decoration:none}
.footer a:hover{text-decoration:underline}
.footer .zh{display:block;margin-bottom:4px}
.footer .en{display:none}
html[lang="en"] .footer .zh{display:none}
html[lang="en"] .footer .en{display:block}
html[lang="en"] body{font-family:var(--en-body)}
.empty-state{text-align:center;padding:30px 20px;color:var(--ink-soft)}
.empty-state .emoji{font-size:40px;display:block;margin-bottom:8px}
.empty-state p{font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <h1>🐣 <b>Yoyo</b> Creative Studio</h1>
    <div class="lang-toggle">
      <button class="opt active" data-lang="zh" onclick="switchLang('zh')">中文</button>
      <span class="sep">|</span>
      <button class="opt" data-lang="en" onclick="switchLang('en')">EN</button>
    </div>
  </div>
  <div class="sub" id="header-sub">✦ KOC 常见问题 ✦</div>
</div>

<div class="container">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="搜索问题..." oninput="filterFAQ(this.value)">
  </div>
  <div class="suggestions" id="suggestions"></div>
  <div id="faq-root"></div>
  <div class="footer">
    <span class="zh">✦ Yoyo Creative Studio · KOC FAQ · 数据更新于 2026.07 ✦</span>
    <span class="en">✦ Yoyo Creative Studio · KOC FAQ · Data updated July 2026 ✦</span>
  </div>
</div>

<script>
const ZH_DATA = [{"name": "📌 一、入门与加入", "icon": "🌟", "items": [{"id": "Q1", "q": "Yoyo Creative Studio 是什么？", "a": "我们是欧美休闲游戏 My Leisure Time 的官方 KOC 创作者社群。通过创作 UGC 内容（图文/视频）推广游戏，获得奖励和游戏福利。\n\n#reward-rules Q1", "rarity": "r"}, {"id": "Q2", "q": "谁能参加？", "a": "任何喜欢 My Leisure Time 的玩家都可以申请。目前主要面向欧美地区用户。", "rarity": "r"}, {"id": "Q3", "q": "怎么加入？", "a": "私信管理员（DM Seraphina / arissalee.）提供以下完整资料：\n\n#项目说明\n1️⃣Account ID6 开头的数字。路径：Login Page → Customer Service Center → Ticket Center\n2️⃣Game UID字母组成的游戏ID。进入游戏 → 点头像 → 个人主页查看\n3️⃣Full Legal Name全名（法律姓名，用于清关）\n4️⃣Street Address详细街道地址（含公寓/单元号）\n5️⃣City城市\n6️⃣State / Province州/省\n7️⃣Postal Code邮编\n8️⃣Country国家\n\n📞 还需提供 联系电话。以上信息用于从中国寄出创作者周边，清关需要完整信息，缺任何一项无法发货。\n\n选择奖励发放服务器（二选一）：\n\n🔹 Beacon Server（测试服）：预览未发布新内容的专用测试服，测试结束后所有进度不会同步/转移至正式服\n• 🔹 Official Server（正式服）：所有玩家的主服务器，游戏数据永久保存，奖励永久有效\n\n#yoyo-rules-read-first 06/23", "rarity": "r"}, {"id": "Q4", "q": "有最低产出要求吗？没达到会被踢吗？", "a": "没有强制\"踢出\"机制。但连续 2 周无产出可能会被移除 KOC 角色。目前没有每月最低积分硬门槛。\n\n#reward-rules Q4", "rarity": "r"}, {"id": "Q5", "q": "刚收到邀请加入Discord就算参加了吗？还需要做什么？", "a": "✅ 回复管理员的邀请消息确认参加，点击链接加入Discord服务器就可以了。之后每月通过Google Form提交你的作品链接即可参与评分。", "rarity": "r"}]}, {"name": "📝 二、内容创作要求", "icon": "🎨", "items": [{"id": "Q6", "q": "要做什么类型的内容？", "a": "平台形式要求\n        Instagram图文贴 / Reels公开账号\n        Facebook图文贴 / 视频个人主页或群组均可\n        TikTok短视频公开账号\n        YouTube视频🆕 7月起视频类纳入积分\n        Reddit图文贴🆕 7月新增\n      \n      #reward-rules Q6", "rarity": "r"}, {"id": "Q7", "q": "一个作品可以发多个平台吗？", "a": "可以，且每个平台都算独立作品。 同一平台重复发同一条内容 → 只计表现最好的一次。\n\n2026年7月新规则 跨平台同内容 = 独立计分（此前旧规则曾规定\"只算最佳平台\"）。\n\n#yoyo-rules-faq Q3", "rarity": "r"}, {"id": "Q8", "q": "我可以宣传自己的 Instagram 账号吗？", "a": "可以在社群内分享，但建议以 MLT 游戏内容为主。", "rarity": "r"}, {"id": "Q9", "q": "内容有什么要求？必须用英文吗？能用AI吗？", "a": "✅ 原创（不能搬运/抄袭）\n✅ 清晰展示MLT游戏画面\n✅ 推荐加官方hashtag **#myleisuretime**\n✅ 文字建议用英文\n❌ 不能说\"paid promotion\"、\"I'm making money\"等\n⚠️ AI辅助工具可以用，但不要过度依赖，确保体现你的原创性。", "rarity": "r"}, {"id": "Q10", "q": "新规下视频只能发TikTok和YouTube吗？Instagram Reels算不算？", "a": "所有平台的视频都算！只是计分方式不同：\n\n🎥 **TikTok & YouTube**：按播放量计分（200播放=1分）\n📱 **Instagram/Facebook等**：视频按互动量计分（40互动=1分）\n\n所以你可以在任何平台发视频。", "rarity": "r"}]}, {"name": "📮 三、提交与审核", "icon": "📄", "items": [{"id": "Q11", "q": "内容发布后要做什么？", "a": "内容发布后，把链接提交到 每月在 📢｜yoyo-bulletin-board 频道发布的 Google 收集链接。\n\n⚠️ 只提交一次即可，不要反复提交。\n\n每个月只需要填一次 Google Form，把所有作品链接一次性提交。\n\n2026年7月起 #yoyo-bulletin-board", "rarity": "r"}, {"id": "Q12", "q": "审核要多久？", "a": "通常在 24-48 小时内。高峰期可能延长到一周。", "rarity": "r"}, {"id": "Q13", "q": "审核不通过的原因？", "a": "❌ 链接打不开（隐私设置问题 / 帖子被删除）\n• ❌ 内容与 MLT 无关\n• ❌ 重复提交（同一条内容多次提交）\n• ❌ 当月已提交过 Google Form，再次提交会被视为无效\n\n提示：每个自然月只统计一次 Google Form 提交。如果填错了，请联系管理员，不要重复提交。", "rarity": "r"}, {"id": "Q14", "q": "我编辑/修改了已发布的内容，需要重新提交吗？", "a": "建议重新发布新帖而不是编辑旧帖。编辑过的帖子可能被 Discord 审核系统忽略。", "rarity": "r"}, {"id": "Q15", "q": "FB群组的帖子也能提交吗？", "a": "✅ 可以。FB群组里发的帖子同样算数，在Google Form提交链接即可。", "rarity": "r"}, {"id": "Q16", "q": "链接是发给助理还是填Google Form就够了？", "a": "✅ 填Google Form就够了，不需要再发给助理。每个月只提交一次。", "rarity": "r"}, {"id": "Q17", "q": "是只交挑战帖还是所有帖子都交？", "a": "看你自己！有些只交挑战主题或数据好的帖子，有些人全部交。只要是MLT内容都算有效提交。", "rarity": "r"}, {"id": "Q18", "q": "6月的帖子还算不算？按新规则还是旧规则？", "a": "✅ 6月的帖子**仍然算数**，按**旧规则**结算。6月内容需在7月10日前提交Google Form。7月起才启用新规则。", "rarity": "ssr"}, {"id": "Q19", "q": "发了帖子你们怎么知道是我发的？我Discord和FB用户名不一样", "a": "✅ 每月通过Google Form提交你的帖子链接即可。链接会关联到你的账号。加hashtag #myleisuretime 还能帮助识别。", "rarity": "r"}]}, {"name": "💰 四、奖励与结算", "icon": "💎", "items": [{"id": "Q20", "q": "积分（Points）怎么算？", "a": "2026年7月新规则：\n      \n        平台视频评分图文评分\n        TikTok 🎥播放量 200 / 400 views互动量\n        YouTube 🆕播放量 200 / 400 views—\n        Instagram互动量互动量\n        Facebook互动量互动量\n        Reddit 🆕—互动量\n      📌 重要：6月及之前的提交按旧规则结算，7月起才启用新规则。\n\n#yoyo-rules-faq Q2 修正", "rarity": "r"}, {"id": "Q21", "q": "一个月多少积分算正常？", "a": "月度上限为 40 分。达到上限后不再累积，下月重置。具体平均分因人而异。", "rarity": "r"}, {"id": "Q22", "q": "积分上限是多少？推荐奖励计入吗？", "a": "每月最高 40 分，月初重置。\n\n推荐积分是额外的 — 不计入每月 40 分上限。", "rarity": "r"}, {"id": "Q23", "q": "奖励有哪些？", "a": "选项说明\nGoogle Play 礼品卡1 分起兑\n游戏钻石1 分起兑\n📦 周边礼包 🆕新老创作者均可获得\n\n#reward-rules（新激励规则）", "rarity": "r"}, {"id": "Q24", "q": "一个月可以兑换多次吗？", "a": "一个月只能兑换一次。", "rarity": "r"}, {"id": "Q25", "q": "没用完的积分下月还在吗？", "a": "在的。 积分按月累积，兑换后剩余积分保留，不重置。", "rarity": "r"}, {"id": "Q26", "q": "什么时候结算？", "a": "📅 每月 5 日：作品提交截止（Google Form）\n• 📩 每月 10 日前：Mochi 通过 Discord DM 告知积分明细&amp;兑换指南\n• 🎁 每月 15 日：兑换截止\n• ⏰ 错过截止日 → 积分自动累积到下月\n\n#yoyo-bulletin-board 07/07", "rarity": "r"}, {"id": "Q27", "q": "最低多少积分能兑换？", "a": "最低 1 分 起兑。", "rarity": "r"}, {"id": "Q28", "q": "一个帖子既有视频又有图片，怎么算分？", "a": "按数据表现更高的那个维度计算。\n💡 例如：图片互动高就按图片算分，视频播放高就按视频算分。", "rarity": "r"}, {"id": "Q29", "q": "连续创作奖励（15条）需要每条都达到40互动吗？不满40互动的帖子也要提交吗？", "a": "✅ **不需要**！连续创作奖励专门支持低互动帖子（40互动/200播放以下）。需要**连续5天发布**。基础积分+创作奖励可同时领取。", "rarity": "r"}]}, {"name": "🏆 五、连续创作奖励", "icon": "🏆", "items": [{"id": "Q30", "q": "连续 5 天发布奖励", "a": "需要在同一个月内 连续 5 天 各发布至少 1 条内容\n• 不需要在同个平台 — 跨平台合计\n• 不需要每条都有积分 — 低互动也计\n• ❌ 不要为了凑天数发低质量内容 — 会影响账号表现\n      \n      ⚠️ 重要更正 v1 版写的是\"不需要连续5天\"，是错误的。官方要求\"连续5天每天发\"（Post for 5 straight days）。\n\n#yoyo-rules-faq Q1（连续创作奖励）", "rarity": "r"}, {"id": "Q31", "q": "连续创作奖（15 条/月）", "a": "所有类型的创作内容都合格\n• 多个平台的提交可以合计计数\n• 常规积分 + 创作奖励 叠加发放\n      \n      #yoyo-rules-faq Q1", "rarity": "r"}]}, {"name": "🔗 六、链接与发布", "icon": "🔗", "items": [{"id": "Q32", "q": "帖子必须发在个人主页吗？", "a": "Facebook 个人主页或群组（如 My Leisure Time Global 群组），两者都算数。", "rarity": "r"}, {"id": "Q33", "q": "分享链接打不开怎么办？", "a": "检查账号是否公开 → 如果已提交到 Google Form，联系管理员修正，不要重复提交。\n\n每个月只需要提交一次 Google Form，反复提交会造成数据混乱。", "rarity": "r"}, {"id": "Q34", "q": "同一个内容重复发布怎么算？", "a": "同一平台重发 → 只计表现最好的一次。不同平台 → 各算各的（2026年7月新规则）。\n\n#yoyo-rules-faq Q3", "rarity": "r"}]}, {"name": "🆕 七、Reddit（2026年7月新增）", "icon": "🆕", "items": [{"id": "Q35", "q": "Reddit 现在也算吗？", "a": "是的，7 月起 Reddit 帖子计入积分。目前仅统计 7 月及之后的发帖。", "rarity": "r"}, {"id": "Q36", "q": "在 Reddit 发什么内容？", "a": "分享 MLT 游戏内容、设计展示、游戏体验等。需发布在公开社区。", "rarity": "r"}]}, {"name": "🎁 八、推荐奖励", "icon": "🎁", "items": [{"id": "Q37", "q": "推荐朋友加入有奖励吗？", "a": "✅ 成功推荐朋友成为 KOC 后可获得额外积分。推荐积分不计入每月 40 分上限。", "rarity": "r"}, {"id": "Q38", "q": "2026年7月新增了哪些创作者计划？", "a": "🎀 Refer-a-Friend 推荐计划\n• 🌟 New Creator Event 新手活动\n• ⭐ Creator Tier System 创作者等级系统\n      \n      #reward-rules（新激励规则）", "rarity": "r"}]}, {"name": "📋 九、社群规则", "icon": "📋", "items": [{"id": "Q39", "q": "Discord 里可以发什么？", "a": "✅ 作品分享 · 创作交流 · 游戏讨论\n• ✅ 设计技巧分享（如无障碍设计、创意搭建）\n• ❌ 广告/第三方推广 · 刷屏/人身攻击", "rarity": "r"}, {"id": "Q40", "q": "有问题找谁？", "a": "内容审核 → #creators-exchange · 奖励结算 → 请在 Forum 【📪｜town-service-station】 发帖提问\n\n2026年7月起 私信容易堆积，频道 @ 容易被刷掉。所有问题请去 Forum 发帖，团队按顺序回复。\n\n#yoyo-bulletin-board 07/07", "rarity": "r"}]}, {"name": "❓ 十、其他", "icon": "❓", "items": [{"id": "Q41", "q": "我以前发的帖子算吗？", "a": "如果当月的结算日前加入并提交了链接，该月的内容也算。\n\n示例：7 月加入，6 月内容也有效，只要在 7月10日前 提交 Google Form。\n\n更正 v1 写的是\"加入后开始算\"，实际上当月及上个月的内容都可能计入。\n\n#yoyo-rules-faq Q2", "rarity": "r"}, {"id": "Q42", "q": "新手有没有额外奖励？", "a": "有。New Creator Event 新手活动，首月可能有额外积分。具体见最新公告。", "rarity": "r"}, {"id": "Q43", "q": "Canva 导出图片不清晰怎么办？", "a": "导出选最高画质。避免使用 Canva 的 AI 功能（会被标记）。", "rarity": "r"}, {"id": "Q44", "q": "怎么录游戏视频和截图？", "a": "使用手机自带录屏，手动编辑（推荐 ibisPaint 等）。避免完全依赖 AI 增强工具。", "rarity": "r"}, {"id": "Q45", "q": "2026年7月新激励规则概要", "a": "🎥 视频门槛降低 — TikTok/YouTube 200/400 views 即可有积分\n• 📈 月积分上限提高至 40 分\n• 🎁 连续创作奖励保留\n• 🚀 新增创作者计划（推荐、新手、等级）\n• 🎀 周边礼包新老创作者都有\n\n以上新规则从 7月起生效。6月及之前的提交仍按旧规则结算。\n\n#yoyo-reward-rules 06/23", "rarity": "r"}]}, {"name": "💬 十一、客服常见私信问题", "icon": "💬", "items": [{"id": "Q46", "q": "Hashtag 是强制要求的吗？Reddit 需要加 hashtag 吗？", "a": "创作灵感文档中列出的 hashtag 只是建议，使用它们有助于内容获得更多曝光。\n\n✅ Facebook 官方群组发的帖子 需要 加官方 hashtag #myleisuretime\n\n✅ Reddit 不需要 hashtag（Reddit 不支持 hashtag）\n\n客服私信 06/24", "rarity": "r"}, {"id": "Q47", "q": "视频内容只能发在 TikTok 吗？Instagram Reels 算吗？", "a": "视频 不包括 Instagram Reels。如果你想提交视频内容，请发到 TikTok 或 YouTube 上。\n\n在 TikTok 和 YouTube 上积累播放量比在 Instagram 上积累互动量更容易获得积分。\n\n客服私信 06/24", "rarity": "r"}, {"id": "Q48", "q": "同一个作品可以发多个平台吗？怎么算？", "a": "✅ 可以。 一份原创内容分发到不同平台，每个平台都算独立提交。\n\n一个作品在不同平台发布算 两次提交，不管是图文还是视频。\n\n客服私信 06/24 7月新规则", "rarity": "r"}, {"id": "Q49", "q": "积分可以攒着不兑换吗？会过期吗？", "a": "✅ 可以。 积分可以一直累积，没有过期时间。\n\n兑换部分积分后，剩余积分会保留在账户里。你想攒多久都行。\n\n客服私信 07/03", "rarity": "r"}, {"id": "Q50", "q": "TikTok 和 Instagram 的积分计算方式一样吗？", "a": "不一样。 平台按不同指标计算积分：\n      \n        平台积分指标\n        TikTok📊 播放量（Views）\n        YouTube📊 播放量（Views）\n        Instagram💬 互动量（Engagement）\n        Facebook💬 互动量（Engagement）\n        Reddit💬 互动量（Engagement）\n      \n      客服私信 07/03", "rarity": "r"}, {"id": "Q51", "q": "连续创作奖励需要每条都达到 40 互动吗？", "a": "不需要。 连续创作奖励（15条/月）只要求提交 15 条合格内容。\n\n单条内容 不需要 达到 40 互动门槛也能计入连续创作奖励。6 月的连续创作奖同样适用此规则。\n\n客服私信 06/28", "rarity": "r"}, {"id": "Q52", "q": "长期没发内容会被踢吗？还能恢复吗？", "a": "没有强制踢出机制。如果太久没发内容可以联系管理员恢复。\n\n每月 28 号会在 📢｜yoyo-bulletin-board 频道发布 Google Form，填写所有内容链接即可重新参与。\n\n客服私信 06/25", "rarity": "r"}, {"id": "Q53", "q": "奖品配送需要提供什么信息？", "a": "需要提供以下完整信息（我们从中国发货，清关需要）：\n      \n        📌 全名（法律姓名，用于清关）\n• 📌 街道地址（含公寓/单元号）\n• 📌 城市、州/省、邮编\n• 📌 国家\n• 📌 联系电话\n      \n      缺少任何一项都会导致无法发货。\n\n客服私信 06/25-30", "rarity": "r"}, {"id": "Q54", "q": "游戏奖励发到哪个服务器？有什么区别？", "a": "两个服务器选一个：\n\n服务器说明\n🔹 Beacon Server预览未发布新内容的专用测试服，测试结束后所有进度不会同步/转移至正式服\n🔹 Official Server所有玩家的主服务器，游戏数据永久保存，奖励永久有效\n\n请谨慎选择，影响游戏内奖励发放。\n\n客服私信 06/23", "rarity": "r"}, {"id": "Q55", "q": "Google Play 礼品卡可以买月卡吗？", "a": "不可以。 Google Play 礼品卡是充值到 Google 账户钱包的预付卡，是 Google 平台的通用支付方式。\n\n它 不能 用于购买游戏的月卡会员。月卡需要使用其他支付方式。\n\n客服私信 06/23", "rarity": "r"}, {"id": "Q56", "q": "\"40 互动\"的标准是总互动还是单条互动？", "a": "是 单条帖子 达到 40 互动量就得 1 分。\n\n⚠️ 之前翻译工具翻译错误，造成了误解。正确规则：\n      \n        单条帖子达到 40 互动量 = 1 分\n• 最多累计 15 条帖子\n• 不需要每条都达到 40 才能被计入\n      \n      更正 客服私信 07/06", "rarity": "r"}, {"id": "Q57", "q": "新手加入有什么额外奖励？", "a": "🎉 7 月新手活动（New Creator Event）：7月提交的作品达到 5 基础分，额外加 2 分\n• 👫 成功推荐朋友成为 KOC：+2 分（推荐积分不计入每月 40 分上限）\n• ⭐ 优质创作者可升 Gold / Platinum 等级，解锁专属特权\n• 📅 灵感参考：💡｜official-inspirations 频道\n\n2026年7月 #yoyo-bulletin-board 07/02", "rarity": "r"}, {"id": "Q58", "q": "我之前发的帖子算吗（加入前发的）？", "a": "算。 当月结算日前加入并提交了链接，该月的内容也算。\n\n示例： 7 月加入，6 月内容也有效，只要在 7 月 10 日前 提交 Google Form。\n\n客服私信 06/23-28", "rarity": "r"}, {"id": "Q59", "q": "提交链接时为什么要复制链接？Google Form 怎么填？", "a": "没有要求必须复制链接到 Discord。你只需要在 Google Form 里填上所有视频/帖子链接即可。\n\n如果表单中有非必填项，可以跳过。但建议多发视频，门槛低容易得积分。\n\n客服私信 07/03", "rarity": "r"}, {"id": "Q60", "q": "现在有问题要问谁？还能私信管理员吗？", "a": "2026年7月起的新流程：\n\n✅ 所有问题请去 Forum 【📪｜town-service-station】 发帖提问\n• ✅ 团队会按顺序回复，不会漏掉\n• ❌ 私信容易堆积，不保证及时回复\n• ❌ 在频道 @ 管理员也容易被刷掉\n• ✅ 内容审核相关 → 仍然可以在 #creators-exchange 交流\n\n📌 重要 请在 Forum 发帖，不要私信或 @。\n\n#yoyo-bulletin-board 07/07", "rarity": "ssr"}, {"id": "Q61", "q": "6月的帖子和新规则是什么关系？6月按什么规则算？", "a": "6月提交 → 按旧规则结算\n\n6月的投稿 7月10日截止提交 Google Form\n• 6月的积分按 旧规则 计算（不是 200/400 views 体系）\n• 7月起才启用 新规则（视频 200/400 views、月上限 40 分等）\n• 7月提交截止日延至 8月5日 (UTC-7)\n\n#yoyo-bulletin-board 06/28 + 07/07", "rarity": "ssr"}, {"id": "Q62", "q": "奖励什么时候发？兑换截止后多久能收到？", "a": "📅 每月15日截止 → 之后陆续发放\n💎 游戏内奖励：1-2周\n🎮 礼品卡：1-2周\n📦 周边：2周内寄出\n超过2周请在 #town-service-station 询问。", "rarity": "r"}, {"id": "Q63", "q": "国际服（非北美服）能参加吗？", "a": "✅ 可以。如果你收到了邀请就说明符合条件。不限于北美服务器。", "rarity": "r"}]}];
const EN_DATA = [{"name": "📌 1. Getting Started", "icon": "🌟", "items": [{"id": "Q1", "q": "What is Yoyo Creative Studio?", "a": "We are the official KOC creator community for the casual mobile game My Leisure Time. By creating UGC content (images/videos) promoting the game, you earn rewards and in-game benefits.", "rarity": "r"}, {"id": "Q2", "q": "Who can participate?", "a": "Any player who enjoys My Leisure Time can apply. Currently open primarily to users in North America and Europe.", "rarity": "r"}, {"id": "Q3", "q": "How do I join?", "a": "DM the admin (Seraphina / arissalee.) with the following info:\n\n# | Item | Description\n1 | Account ID | A number starting with 6. Path: Login Page → Customer Service Center → Ticket Center\n2 | Game UID | Letter-based game ID. Launch game → tap avatar → profile page\n3 | Full Legal Name | Full legal name (for customs clearance)\n4 | Street Address | Detailed street address (include apt/unit)\n5 | City | City\n6 | State/Province | State / Province\n7 | Postal Code | Postal code\n8 | Country | Country\n9 | Phone | Contact phone number\n\nOnce reviewed, you will receive verified creator status.", "rarity": "r"}, {"id": "Q4", "q": "Is there a minimum output requirement? Will I be removed if inactive?", "a": "There is no forced removal mechanism. However, if a creator has no activity for 2 consecutive weeks, they may be removed from the KOC role. There is no strict minimum score requirement.", "rarity": "r"}, {"id": "Q5", "q": "I just got invited to join. Is joining the Discord enough to participate?", "a": "✅ Reply to the admin's invite to confirm, click the link to join the Discord server, and you're all set. After that, submit your work links via the monthly Google Form to participate in scoring.", "rarity": "r"}]}, {"name": "📝 2. Content Creation", "icon": "🎨", "items": [{"id": "Q6", "q": "What type of content should I create?", "a": "Platform requirements:\n- Instagram: Image posts / Reels — public account\n- Facebook: Image posts / Videos — personal page or group both OK\n- TikTok: Short videos — public account\n\nAll game-related content is accepted: home builds, outfit styling, fan art, guides & tips, cosplay, news roundups.", "rarity": "r"}, {"id": "Q7", "q": "Can I post the same work on multiple platforms?", "a": "Yes, and each platform counts as a separate submission. Posting identical content multiple times on the SAME platform → only the best-performing one counts.\n\n⚠️ Cross-platform same content = counted separately. If you rewrite captions, add new text overlays, or significantly edit the image, each revised version can count as new work.", "rarity": "r"}, {"id": "Q8", "q": "Can I promote my own Instagram account?", "a": "You can share it within the community, but please keep the focus on MLT game content.", "rarity": "r"}, {"id": "Q9", "q": "What are the content requirements? Does it need to be in English? Can I use AI?", "a": "✅ Original content only (no copying/plagiarism)\n✅ Clearly show MLT gameplay\n✅ Recommended: use official hashtag **#myleisuretime**\n✅ Text should be in English\n❌ Don't say \"paid promotion\", \"I'm making money\", etc.\n⚠️ AI-assisted tools are allowed, but don't rely on them entirely.", "rarity": "r"}, {"id": "Q10", "q": "Under the new rules, can I only post videos on TikTok and YouTube? What about Instagram Reels?", "a": "Videos on ALL platforms count! Different scoring:\n\n🎥 **TikTok & YouTube**: Scored by views (200 views = 1 point)\n📱 **Instagram/Facebook etc.**: Scored by engagement (40 interactions = 1 point)", "rarity": "r"}]}, {"name": "📮 3. Submission & Review", "icon": "📄", "items": [{"id": "Q11", "q": "What do I do after publishing content?", "a": "Submit your links via the Google Form posted monthly in #yoyo-bulletin-board.\n\n⚠️ Submit once only — don't submit multiple times. Submit all your links in one go each month.", "rarity": "r"}, {"id": "Q12", "q": "How long does the review take?", "a": "Usually 24-48 hours. During peak periods it may extend to one week.", "rarity": "r"}, {"id": "Q13", "q": "Why was my submission rejected?", "a": "❌ Link doesn't open (privacy settings / post deleted)\n❌ Content not related to MLT\n❌ Duplicate submission (same content multiple times)\n❌ Already submitted Google Form this month — resubmissions are invalid\n\nOnly one Google Form submission counts per month. If you made a mistake, contact the admin instead of resubmitting.", "rarity": "r"}, {"id": "Q14", "q": "I edited/modified published content. Do I need to resubmit?", "a": "It's recommended to publish a new post instead of editing an old one. Edited posts may be ignored by the review system.", "rarity": "r"}, {"id": "Q15", "q": "Can I submit posts I made in the Facebook group?", "a": "✅ Yes. Posts in the Facebook group count too — just submit the links in the Google Form.", "rarity": "r"}, {"id": "Q16", "q": "Do I send links to the assistant or just fill the Google Form?", "a": "Just fill the Google Form — no need to also send links to the assistant. Submit once per month with all your links in one go.", "rarity": "r"}, {"id": "Q17", "q": "Should I only submit challenge posts or all my posts?", "a": "Up to you! Some submit only challenge posts, others everything. As long as it's MLT-related, it's valid.", "rarity": "r"}, {"id": "Q18", "q": "Do June posts still count? Old rules or new rules?", "a": "June posts still count, settled under the old rules.\n\nSubmit June content via Google Form by July 10. New rules (200/400 views system, 40-point cap, etc.) start from July onward.", "rarity": "ssr"}, {"id": "Q19", "q": "How do you know my posts are mine? My Discord and Facebook usernames are different.", "a": "✅ Submit your post links via the monthly Google Form. Adding #myleisuretime also helps.", "rarity": "r"}]}, {"name": "💰 4. Rewards & Settlement", "icon": "💎", "items": [{"id": "Q20", "q": "How are points calculated?", "a": "New rules (effective July):\n\nEngagement/Views | Points\n1-39 | 0\n40-99 | 1\n100-199 | 2\n200-499 | 3\n500-999 | 5\n1000+ | 10\n\nTikTok/YouTube score by views; other platforms score by engagement.\n\nImportant: June & before settle under old rules. New rules apply from July onward.", "rarity": "r"}, {"id": "Q21", "q": "How many points per month is normal?", "a": "The monthly cap is 40 points. Once you reach the cap, no more points accumulate. Averages vary by individual.", "rarity": "r"}, {"id": "Q22", "q": "What's the point cap? Do referral points count towards it?", "a": "Monthly cap: 40 points, resets at month start.\n\nReferral points are extra — they do count toward the 40-point cap. A referral is only valid when your friend completes the review process and officially becomes a creator.", "rarity": "r"}, {"id": "Q23", "q": "What rewards can I get?", "a": "Option | Details\nGoogle Play Gift Card | Redeemable from 1 point\nIn-game Diamonds | Redeemable from 1 point\nMerch Pack | Available to new and existing creators\n\nYou can choose TWO types of rewards per month.", "rarity": "r"}, {"id": "Q24", "q": "Can I redeem multiple times per month?", "a": "Once per month only.", "rarity": "r"}, {"id": "Q25", "q": "Do unused points carry over?", "a": "Yes. Points accumulate month by month. Remaining points after redemption are retained — they don't reset.", "rarity": "r"}, {"id": "Q26", "q": "When is the settlement?", "a": "📅 5th of the month: Submission deadline (Google Form)\n📩 Before 10th: Mochi sends point details & redemption guide via Discord DM\n🎁 15th: Redemption deadline\n⏰ Miss the deadline → Points auto-roll to next month\n\nJuly submission deadline extended to August 5 (UTC-7). July Google Form posted at end of July.", "rarity": "r"}, {"id": "Q27", "q": "What's the minimum points to redeem?", "a": "Minimum 1 point to redeem.", "rarity": "r"}, {"id": "Q28", "q": "If a post contains both video and images, how is it scored?", "a": "Scored based on whichever metric performs better.\n💡 Example: high image engagement → scores as image; high video views → scores as video.", "rarity": "r"}, {"id": "Q29", "q": "For the Continuous Creation Bonus (15 posts), does every post need 40 engagement?", "a": "✅ **No minimum engagement required!** This bonus supports low-stats posts. **5 consecutive days** required. Base points + creation bonus stack.", "rarity": "r"}]}, {"name": "🏆 5. Continuous Creation Bonus", "icon": "🏆", "items": [{"id": "Q30", "q": "5 consecutive days posting reward", "a": "• Post at least 1 piece of content for 5 consecutive days within the same month\n• Doesn't need to be the same platform — cross-platform counts\n• No minimum engagement required — low-performing posts count too\n• Don't rush low-quality content just for the bonus", "rarity": "r"}, {"id": "Q31", "q": "Continuous Creation Bonus (15 posts/month)", "a": "This bonus supports creators with low stats (under 40 engagement / 200 views).\n\nRules: Post for 5 consecutive days. Total ≥15 posts per month.\n\nAll creative content types qualify. Cross-platform submissions can be combined.\n\nBase points + creation bonus stack together! Platinum creators (Janie, Achiru, Diana, Taylor) receive the maximum 20 base points plus this incentive.", "rarity": "r"}]}, {"name": "🔗 6. Links & Publishing", "icon": "🔗", "items": [{"id": "Q32", "q": "Do I need to post on my personal page?", "a": "Both personal Facebook profiles and group pages are acceptable — both count for submissions.\n\nHowever, we highly recommend sharing your creations on public platforms like TikTok and YouTube for maximum exposure.", "rarity": "r"}, {"id": "Q33", "q": "What if the share link doesn't open?", "a": "Check your privacy settings — the post must be publicly accessible. If it still doesn't work, try generating a new share link.\n\nOnly submit the Google Form once per month. Repeated submissions cause data confusion.", "rarity": "r"}, {"id": "Q34", "q": "How are duplicate posts counted?", "a": "Same content across different platforms = separate valid submissions.\n\nSame platform duplicate: Identical content posted repeatedly on the same platform counts as only 1 valid submission. Exception: rewritten captions or significant edits can count as new work.", "rarity": "r"}]}, {"name": "🆕 7. Reddit (New in July 2026)", "icon": "🆕", "items": [{"id": "Q35", "q": "Can Reddit posts participate now?", "a": "Yes! Reddit was added as a supported platform in July 2026. Reddit content counts toward the program. Hashtags are not required on Reddit.", "rarity": "r"}, {"id": "Q36", "q": "What should I post on Reddit?", "a": "Any MLT game-related content: home builds, outfit styling, tips, questions, discussions. Engagement (upvotes + comments) on Reddit counts toward scoring.", "rarity": "r"}]}, {"name": "🎁 8. Refer-a-Friend", "icon": "🎁", "items": [{"id": "Q37", "q": "Is there a reward for referring friends?", "a": "Yes! Share the official recruitment post with your friends.\n\nRewards:\n1. Friend passes review & becomes a creator → you get 2 points\n2. Friend reaches 5 points in first month → you get 2 more points\n\nReferral bonus points count toward your monthly cap. A referral is only valid after your friend completes the review process.", "rarity": "r"}, {"id": "Q38", "q": "What new creator programs were added in July 2026?", "a": "• New Creator Event: 5 base points → +2 bonus points (one-time)\n• Refer-a-Friend Program: Earn points for successful referrals\n• Creator Tier system: Gold / Platinum tiers with exclusive perks", "rarity": "r"}]}, {"name": "📋 9. Community Rules", "icon": "📋", "items": [{"id": "Q39", "q": "What can I post in Discord?", "a": "✅ Work sharing · Creative exchange · Game discussion\n✅ Design tips (accessibility, creative builds)\n❌ Ads/third-party promotion · Spam/personal attacks\n❌ Leaking internal incentives, tasks, or unreleased info\n\nFull rules in #yoyo-rules-read-first.", "rarity": "r"}, {"id": "Q40", "q": "Who do I ask for help?", "a": "New process from July 2026:\n\n✅ Create a thread in forum #town-service-station\n✅ Team replies in submission order — no messages lost\n❌ DMs pile up — not guaranteed timely replies\n❌ @mentions in chat channels also get buried\n✅ Content review questions: still fine in #creators-exchange\n\nImportant: Your username is recorded when you join the server. If you change your Discord display name, notify the admin immediately!", "rarity": "r"}]}, {"name": "❓ 10. Other", "icon": "❓", "items": [{"id": "Q41", "q": "Do my previous posts count?", "a": "Yes, if you submit before the monthly deadline.\n\nExample: Join in July → June content also counts, as long as you submit the Google Form before the deadline.", "rarity": "r"}, {"id": "Q42", "q": "Is there extra bonus for new creators?", "a": "Yes! New Creator Event: reach 5 base points in your first month and get +2 bonus points. See latest bulletin for details.", "rarity": "r"}, {"id": "Q43", "q": "Canva exports are blurry. What should I do?", "a": "Export at the highest quality setting. Avoid using Canva's AI features (they may be flagged).", "rarity": "r"}, {"id": "Q44", "q": "How do I record game video and take screenshots?", "a": "Use your phone's built-in screen recorder and manual editing tools (ibisPaint recommended). Avoid relying entirely on AI enhancement tools.", "rarity": "r"}, {"id": "Q45", "q": "July 2026 new incentive rules summary", "a": "• Lower video threshold — TikTok/YouTube 200/400 views = points\n• Monthly cap raised to 40 points\n• Continuous Creation Bonus retained\n• New programs: Referral, New Creator, Tier System\n• Merch packs for new and existing creators\n\nNew rules effective from July. June & before settled under old rules.", "rarity": "r"}]}, {"name": "💬 11. Common CS Questions", "icon": "💬", "items": [{"id": "Q46", "q": "Is the hashtag mandatory? Does Reddit need hashtags?", "a": "Not mandatory but recommended for Facebook/TikTok/IG. Reddit is exempt (no hashtags). Adding #myleisuretime helps us track your submissions and gives priority traffic boosts.", "rarity": "r"}, {"id": "Q47", "q": "Can I only post videos on TikTok? Do Instagram Reels count?", "a": "Videos on any platform count: TikTok, YouTube, Instagram Reels, Facebook Reels. TikTok & YouTube score by views; Instagram & others score by engagement.", "rarity": "r"}, {"id": "Q48", "q": "Same work on multiple platforms — how does scoring work?", "a": "Each platform counts separately. Cross-posting the same work is allowed and each gets its own score.", "rarity": "r"}, {"id": "Q49", "q": "Can I save points without redeeming? Do they expire?", "a": "Yes. Points accumulate indefinitely and never expire.\n\nPartial redemption leaves remaining points in your account. Save as long as you like!", "rarity": "r"}, {"id": "Q50", "q": "Are TikTok and Instagram scored the same way?", "a": "No. TikTok & YouTube score by views (200 views = 1 point). Instagram scores by engagement (40 interactions = 1 point).", "rarity": "r"}, {"id": "Q51", "q": "Does every post need 40 engagement for the CCB?", "a": "No. The Continuous Creation Bonus has no minimum engagement requirement. Low-performing posts also count toward the 15-post monthly target.", "rarity": "r"}, {"id": "Q52", "q": "Will I be removed for long inactivity? Can I recover?", "a": "No forced removal. If inactive for a long time, you can contact the admin to resume.\n\nA Google Form is posted in #yoyo-bulletin-board around the 28th of each month — fill it with your links to rejoin.", "rarity": "r"}, {"id": "Q53", "q": "What info do I need for reward delivery?", "a": "DM the admin: Account ID/Game UID, full shipping address (country + street + postal code + phone), and reward server (Beacon/Official). All fields required for customs clearance.", "rarity": "r"}, {"id": "Q54", "q": "Which server are rewards sent to? What's the difference?", "a": "Choose one server:\n\nBeacon Server (Test Server): A dedicated test server for previewing unreleased updates. All data on Beacon will NOT sync to the Official Server once testing ends.\n\nOfficial Server: The main server for all regular players. Your game data is saved permanently.\n\nBeacon is the beta server (APK access only) and usually gets updates a few days earlier.", "rarity": "r"}, {"id": "Q55", "q": "Can Google Play gift cards buy subscriptions?", "a": "No. Google Play gift cards are prepaid cards credited to your Google account wallet. They cannot be used for in-game monthly subscriptions.", "rarity": "r"}, {"id": "Q56", "q": "Is \"40 engagement\" per total or per single post?", "a": "It's per single post reaching 40 engagement = 1 point.\n\nCorrect rule:\n• Single post with 40 engagement = 1 point\n• Maximum 15 posts counted\n• Not every post needs to reach 40 to count", "rarity": "r"}, {"id": "Q57", "q": "What extra rewards do new creators get?", "a": "• July New Creator Event: reach 5 base points → +2 bonus points\n• Refer-a-friend: +2 points (counts toward 40-point cap)\n• Top creators can reach Gold/Platinum tiers with exclusive perks\n• Inspiration: #official-inspirations channel", "rarity": "r"}, {"id": "Q58", "q": "Do posts from before joining count?", "a": "Content published the month you join (including before joining) counts — as long as you submit the Google Form before deadline.", "rarity": "r"}, {"id": "Q59", "q": "Why copy the link? How do I fill the Google Form?", "a": "Copy the URL of each published post and paste into the Google Form. Submit once per month only. The form collects all your links in one place for review.", "rarity": "r"}, {"id": "Q60", "q": "Who do I ask for help now? Can I still DM admins?", "a": "New process from July 2026:\n\n✅ All questions → Forum #town-service-station (thread)\n✅ Team replies in order — won't miss anything\n❌ DMs pile up — no guaranteed timely reply\n❌ @mentions in channels also get buried\n✅ Content review: still okay in #creators-exchange\n\nPost in the forum, don't DM or @mention.", "rarity": "ssr"}, {"id": "Q61", "q": "How do June posts relate to the new rules?", "a": "June submissions → settled under OLD rules\n\n• June posts deadline: July 10 via Google Form\n• June points calculated under old rules (not 200/400 views system)\n• New rules start July onward (200/400 views, 40-point cap, etc.)\n• July submission deadline: August 5 (UTC-7)", "rarity": "ssr"}, {"id": "Q62", "q": "When are rewards distributed? How long after the redemption deadline?", "a": "📅 Deadline 15th → rewards start after\n💎 In-game: 1-2 weeks\n🎮 Gift cards: 1-2 weeks\n📦 Merch: ships within 2 weeks\nAsk in #town-service-station if >2 weeks.", "rarity": "r"}, {"id": "Q63", "q": "Can I participate if I play on the international server?", "a": "✅ Yes. If you received an invitation, you're eligible regardless of server.", "rarity": "r"}]}];
let currentLang = 'zh';

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtInline(t) {
  return t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code>$1</code>');
}

function fmtAnswer(text) {
  if (!text) return '<p></p>';
  let lines = text.split(String.fromCharCode(10));
  let out = '';
  let inTable = false;
  for (let line of lines) {
    let t = line.trim();
    // pipe table row
    if (t.startsWith('|') && t.endsWith('|')) {
      let cells = t.split('|').filter(c => c.trim());
      if (cells.length > 1) {
        if (t.includes('---')) continue;
        if (!inTable) { out += '<table>'; inTable = true; }
        let isHead = !inTable && !document.querySelector('#faq-root table');
        if (out.includes('<tr>')) isHead = false; // already had rows
        out += '<tr>' + cells.map(c => '<' + (isHead ? 'th' : 'td') + '>' + fmtInline(esc(c.trim())) + '</' + (isHead ? 'th' : 'td') + '>').join('') + '</tr>';
        continue;
      }
    }
    if (inTable) { out += '</table>'; inTable = false; }
    if (t === '') { out += '<br>'; continue; }
    out += '<p>' + fmtInline(esc(t)) + '</p>';
  }
  if (inTable) out += '</table>';
  // tables need th detection: check if first header-like
  out = out.replace('<table>', function(m) {
    let idx = out.indexOf('<tr>');
    if (idx > 0) {
      let before = out.substring(0, idx);
      if (!before.includes('<th>')) {
        // first row should be th
        out = out.replace('<tr>', '<tr class="first-row">');
      }
    }
    return m;
  });
  return '<div style="margin-top:4px">' + out + '</div>';
}

function renderFAQ(data) {
  const root = document.getElementById('faq-root');
  const sug = document.getElementById('suggestions');
  root.innerHTML = '';
  sug.innerHTML = '';

  let html = '';
  let allQs = [];
  data.forEach(cat => {
    html += '<div class="category"><div class="category-header"><span class="icon">' + esc(cat.icon) + '</span><h2>' + esc(cat.name) + '</h2><span class="count">' + cat.items.length + '</span></div>';
    cat.items.forEach(item => {
      let sid = item.id.slice(1);
      let rc = item.rarity === 'ssr' ? 'ssr' : '';
      let qe = esc(item.q);
      html += '<div class="item" data-q="' + qe + '"><div class="item-header" onclick="toggleBody(this)"><span class="q-num">#' + sid + '</span><span class="q-text">' + qe + '</span><span class="rarity-tag ' + rc + '">' + item.rarity.toUpperCase() + '</span></div><div class="item-body">' + fmtAnswer(item.a) + '</div></div>';
      allQs.push(item.q);
    });
    html += '</div>';
  });
  root.innerHTML = html;

  // suggestions
  let seen = new Set(), chips = [];
  allQs.forEach(q => {
    let short = q.slice(0, 24);
    if (!seen.has(short)) { seen.add(short); chips.push(q); }
  });
  sug.innerHTML = chips.slice(0, 8).map(q => '<span class="chip" onclick="searchChip(this)">' + esc(q.slice(0, 24)) + (q.length > 24 ? '…' : '') + '</span>').join('');
}

function toggleBody(h) {
  h.nextElementSibling.classList.toggle('open');
}

function switchLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('.lang-toggle .opt').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.getElementById('header-sub').textContent = lang === 'zh' ? '✦ KOC 常见问题 ✦' : '✦ KOC Frequently Asked Questions ✦';
  document.querySelector('.footer .zh').style.display = lang === 'zh' ? 'block' : 'none';
  document.querySelector('.footer .en').style.display = lang === 'en' ? 'block' : 'none';
  document.getElementById('search').placeholder = lang === 'zh' ? '搜索问题...' : 'Search questions...';
  let data = lang === 'zh' ? ZH_DATA : EN_DATA;
  renderFAQ(data);
  let val = document.getElementById('search').value;
  if (val) filterFAQ(val);
}

function filterFAQ(q) {
  let items = document.querySelectorAll('.item');
  let count = 0;
  items.forEach(el => {
    let text = el.dataset.q || '';
    if (!q || text.toLowerCase().includes(q.toLowerCase())) {
      el.classList.remove('hidden');
      count++;
    } else {
      el.classList.add('hidden');
    }
  });
  let empty = document.getElementById('empty-state');
  if (count === 0 && q) {
    if (!empty) {
      let e = document.createElement('div');
      e.id = 'empty-state';
      e.className = 'empty-state';
      e.innerHTML = '<span class="emoji">🔮</span><p>' + (currentLang === 'zh' ? '没有找到相关问题，试试其他关键词？' : 'No matching questions. Try different keywords?') + '</p>';
      document.getElementById('faq-root').after(e);
    }
  } else {
    if (empty) empty.remove();
  }
}

function searchChip(el) {
  document.getElementById('search').value = el.textContent;
  filterFAQ(el.textContent);
}
