<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoyo Town · Creator Redemption</title>
<style>
  :root { --pink: #f2a6c4; --pink-light: #fce4ec; --pink-dark: #d4749a; --bg: #fef6f9; --card: #ffffff; --text: #3d2b36; --text-light: #8a7a83; --border: #f0dae4; --shadow: 0 4px 20px rgba(210,120,150,0.12); --radius: 16px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .container { max-width: 520px; width: 100%; padding: 20px; }
  .header { text-align: center; padding: 40px 0 24px; }
  .header h1 { font-size: 26px; font-weight: 700; color: var(--pink-dark); letter-spacing: -0.5px; }
  .header p { color: var(--text-light); font-size: 14px; margin-top: 6px; }
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 16px; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  input[type="text"] { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; outline: none; transition: border 0.2s; background: #faf5f7; margin-bottom: 12px; }
  input:focus { border-color: var(--pink); }
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--pink); color: white; width: 100%; }
  .btn-primary:hover { background: var(--pink-dark); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-option { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; background: var(--card); cursor: pointer; text-align: left; transition: all 0.2s; margin-bottom: 8px; }
  .btn-option:hover { border-color: var(--pink); background: var(--pink-light); }
  .btn-option.selected { border-color: var(--pink-dark); background: #fce4ec; }
  .btn-option .name { font-weight: 600; font-size: 15px; }
  .btn-option .cost { font-size: 13px; color: var(--text-light); margin-top: 2px; }
  .hidden { display: none !important; }
  .points-display { text-align: center; padding: 16px 0; }
  .points-number { font-size: 52px; font-weight: 800; color: var(--pink-dark); line-height: 1; }
  .points-label { font-size: 14px; color: var(--text-light); margin-top: 4px; }
  .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 90%; text-align: center; }
  .toast.show { opacity: 1; }
  .toast.success { background: #4caf50; color: white; }
  .toast.error { background: #e74c3c; color: white; }
  .order-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .order-item:last-child { border-bottom: none; }
  .order-meta { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-pending { background: #fff3e0; color: #e65100; }
  .badge-shipped { background: #e8f5e9; color: #2e7d32; }
  .banner { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px; text-align: center; }
  .banner a { color: var(--pink-dark); text-decoration: none; font-weight: 600; }
  .banner a:hover { text-decoration: underline; }
  .footer { text-align: center; padding: 24px 0 40px; font-size: 12px; color: var(--text-light); line-height: 1.5; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎀 Yoyo Town</h1>
    <p>Creator Reward Redemption</p>
  </div>

  <!-- Login -->
  <div id="step-login" class="card">
    <div class="card-title">🔑 Verify Your Identity</div>
    <label>Discord Name</label>
    <input type="text" id="input-discord" placeholder="Your Discord username" autocomplete="off">
    <label>UID</label>
    <input type="text" id="input-uid" placeholder="Your UID" autocomplete="off">
    <button class="btn btn-primary" id="btn-login" onclick="login()">Check My Points</button>
    <div style="margin-top:14px;font-size:12px;color:var(--text-light);text-align:center;">
      Need help? DM Yoyo Assistant on Discord.
    </div>
  </div>

  <!-- Dashboard -->
  <div id="step-dashboard" class="hidden">
    <div class="card">
      <div class="points-display">
        <div class="points-number" id="display-points">--</div>
        <div class="points-label">Available Points</div>
      </div>
      <div style="font-size:13px;text-align:center;color:var(--text-light);" id="display-user"></div>
    </div>

    <div class="card">
      <div class="card-title">🎁 Select Your Reward</div>
      <div id="options-container"></div>
      <div id="reward-fields" class="hidden" style="margin-top:8px;">
        <label>Shipping Info (name, address, phone)</label>
        <input type="text" id="input-contact" placeholder="Required for merch delivery">
      </div>
      <button class="btn btn-primary" id="btn-redeem" onclick="redeem()" disabled>Confirm Redemption</button>
    </div>

    <div class="card" id="orders-card" style="display:none;">
      <div class="card-title">📋 My Orders</div>
      <div id="orders-list"><div style="color:var(--text-light);font-size:13px;">No orders yet</div></div>
    </div>

    <button class="btn" style="width:100%;border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--card);font-size:14px;color:var(--text-light);cursor:pointer;" onclick="logout()">← Switch Account</button>
  </div>

  <div class="footer">
    Developed by Yoyo Assistant 💗 Mochi · Yoyo Creative Studio
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://rryzofimrehmkijkckrm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oyewqnQ8AnitAOD94Qg0nA_v6Zqkr7r';
const REWARDS = [
  { id: 'diamonds', name: '💎 Diamonds', cost: 1, desc: '1 Point = 450 Diamonds', amount: '450 Diamonds' },
  { id: 'gplay', name: '🎮 Google Play $10', cost: 2, desc: '2 Points = $10 Gift Card', amount: '$10 Google Play' },
  { id: 'merch', name: '📦 Merch Pack', cost: 5, desc: '5 Points = 3 random items', amount: 'Random Merch ×3' }
];

let currentUser = null;
let selectedOption = null;

function supabaseFetch(url, opts = {}) {
  return fetch(url, { ...opts, headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', ...opts.headers } });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type||'') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function getBalance(uid) {
  try {
    const r = await supabaseFetch(`${SUPABASE_URL}/rest/v1/point_logs?uid=eq.${encodeURIComponent(uid)}&order=created_at.desc&limit=1`);
    const d = await r.json();
    return (d && d.length > 0) ? d[0].balance_after : 0;
  } catch(e) { return 0; }
}

async function login() {
  const discord = document.getElementById('input-discord').value.trim();
  const uid = document.getElementById('input-uid').value.trim();
  if (!discord || !uid) { showToast('Please enter both Discord name and UID', 'error'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Checking...';

  try {
    const res = await supabaseFetch(`${SUPABASE_URL}/rest/v1/kocs?uid=eq.${encodeURIComponent(uid)}&discord_name=eq.${encodeURIComponent(discord)}&select=uid,discord_name,name,status`);
    const data = await res.json();
    if (!data || data.length === 0) {
      showToast('No match found. Check your Discord name and UID.', 'error');
      btn.disabled = false; btn.textContent = 'Check My Points';
      return;
    }
    const points = await getBalance(uid);
    currentUser = { ...data[0], points };
    showDashboard();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Check My Points';
  }
}

function showDashboard() {
  document.getElementById('step-login').classList.add('hidden');
  document.getElementById('step-dashboard').classList.remove('hidden');
  document.getElementById('display-points').textContent = currentUser.points;
  document.getElementById('display-user').textContent = 'Welcome, ' + currentUser.discord_name;
  renderOptions();
  loadOrders();
}

function renderOptions() {
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  selectedOption = null;
  document.getElementById('btn-redeem').disabled = true;
  document.getElementById('reward-fields').classList.add('hidden');

  const affordable = REWARDS.filter(r => currentUser.points >= r.cost);
  if (affordable.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--text-light);padding:16px;">Insufficient points. Keep creating!</div>';
    return;
  }
  affordable.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'btn-option';
    btn.innerHTML = '<div class="name">' + opt.name + '</div><div class="cost">' + opt.desc + '</div>';
    btn.onclick = () => {
      document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedOption = opt;
      document.getElementById('btn-redeem').disabled = false;
      document.getElementById('reward-fields').classList.toggle('hidden', opt.id !== 'merch');
      if (opt.id !== 'merch') document.getElementById('input-contact').value = '';
    };
    container.appendChild(btn);
  });
}

async function redeem() {
  if (!selectedOption || !currentUser) return;
  if (currentUser.points < selectedOption.cost) { showToast('Insufficient points', 'error'); return; }

  const btn = document.getElementById('btn-redeem');
  btn.disabled = true; btn.textContent = 'Submitting...';

  try {
    const newBalance = currentUser.points - selectedOption.cost;
    const contact = document.getElementById('input-contact').value.trim() || '';

    // Create order
    const oResp = await supabaseFetch(SUPABASE_URL + '/rest/v1/redemption_orders', {
      method: 'POST',
      body: JSON.stringify({
        uid: currentUser.uid, discord_name: currentUser.discord_name, koc_name: currentUser.name || '',
        option_type: selectedOption.id, option_name: selectedOption.name,
        points_spent: selectedOption.cost, reward_amount: selectedOption.amount,
        contact_info: contact, status: 'pending', created_at: new Date().toISOString()
      })
    });
    if (!oResp.ok) throw new Error('Order failed');

    // Deduct points
    const lResp = await supabaseFetch(SUPABASE_URL + '/rest/v1/point_logs', {
      method: 'POST',
      body: JSON.stringify({
        uid: currentUser.uid, change: -selectedOption.cost, balance_after: newBalance,
        source: 'redemption', reason: 'Redeemed: ' + selectedOption.name, created_at: new Date().toISOString()
      })
    });
    if (!lResp.ok) throw new Error('Point deduction failed');

    currentUser.points = newBalance;
    document.getElementById('display-points').textContent = newBalance;
    showToast('✅ Redemption submitted!', 'success');
    selectedOption = null;
    document.getElementById('btn-redeem').disabled = true;
    document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected'));
    document.getElementById('reward-fields').classList.add('hidden');
    renderOptions();
    loadOrders();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Confirm Redemption';
}

async function loadOrders() {
  try {
    const r = await supabaseFetch(SUPABASE_URL + '/rest/v1/redemption_orders?uid=eq.' + encodeURIComponent(currentUser.uid) + '&order=created_at.desc&limit=20');
    const d = await r.json();
    if (!d || d.length === 0) return;
    document.getElementById('orders-card').style.display = 'block';
    document.getElementById('orders-list').innerHTML = d.map(o =>
      '<div class="order-item">' + o.option_name + ' <span class="badge badge-' + o.status + '">' + o.status + '</span>' +
      '<div class="order-meta">' + new Date(o.created_at).toLocaleDateString() + ' · ' + o.points_spent + ' pts</div></div>'
    ).join('');
  } catch(e) {}
}

function logout() {
  currentUser = null; selectedOption = null;
  document.getElementById('step-login').classList.remove('hidden');
  document.getElementById('step-dashboard').classList.add('hidden');
  document.getElementById('input-discord').value = '';
  document.getElementById('input-uid').value = '';
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'Check My Points';
}
</script>
</body>
</html>
